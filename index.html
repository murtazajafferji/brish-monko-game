<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#ffffff"/>
<title>Brish & Monko: Smash & Bloom</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  * { padding: 0; margin: 0; }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    height: 100vh;
    background: #fafafa;
    font-family: 'Fredoka', system-ui, sans-serif;
    user-select: none;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
  }
  h1 {
    font-size: clamp(22px, 5vw, 36px);
    color: #333;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: clamp(12px, 3vw, 16px);
    color: #888;
    margin-bottom: 16px;
  }
  canvas {
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,.08);
  }
  .hero-picker {
    display: flex;
    gap: 12px;
    margin-top: 14px;
  }
  .hero-btn {
    padding: 8px 20px;
    border-radius: 10px;
    border: 2px solid #ddd;
    background: #fff;
    font-family: 'Fredoka', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: .15s;
    color: #555;
  }
  .hero-btn.selected {
    border-color: #7c4dff;
    background: #f3edff;
    color: #5b21b6;
  }
  .hero-btn:active {
    transform: scale(.96);
  }
  .info {
    margin-top: 10px;
    font-size: 13px;
    color: #aaa;
  }
</style>
<script src="index.js" defer type="module"></script>
</head>
<body>
  <h1>Brish & Monko</h1>
  <p class="subtitle">Smash & Bloom — tap to jump, dodge the obstacles</p>
  <canvas id="game"></canvas>
  <div class="hero-picker">
    <button class="hero-btn selected" id="pick-brish" onclick="pickHero('brish')">🥊 Brish</button>
    <button class="hero-btn" id="pick-monko" onclick="pickHero('monko')">🌸 Monko</button>
  </div>
  <p class="info">Tap screen or press Space to jump • Press H to switch hero</p>
  <script>
    function pickHero(hero) {
      document.getElementById('pick-brish').classList.toggle('selected', hero === 'brish');
      document.getElementById('pick-monko').classList.toggle('selected', hero === 'monko');
      // Dispatch custom event for the game module to pick up
      window.dispatchEvent(new CustomEvent('heroChange', { detail: hero }));
    }
  </script>
</body>
</html>
